  <!-- Gelombang Air Biru (6 Gelombang Atas & 4 Gelombang Bawah) -->
  <path d="M28 58 Q39 53 50 58 T72 58" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
  <path d="M28 65 Q39 60 50 65 T72 65" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
  <path d="M28 72 Q39 67 50 72 T72 72" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Bulir Padi Mas Kuning (Kemakmuran Kiri) -->
  <path d="M24 32 C18 42, 18 52, 25 62" fill="none" stroke="#eab308" stroke-width="2.5" stroke-dasharray="3,3" stroke-linecap="round" />
  
  <!-- Kuncup Kapas Putih (Kesejahteraan Kanan) -->
  <path d="M76 32 C82 42, 82 52, 75 62" fill="none" stroke="#f4f4f5" stroke-width="2.5" stroke-dasharray="4,4" stroke-linecap="round" />
